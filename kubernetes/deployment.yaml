apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-monitor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloud-monitor
  template:
    metadata:
      labels:
        app: cloud-monitor
    spec:
      containers:
        - name: cloud-monitor
          image: YOUR_ECR_REPO/cloud-monitor:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: database-url
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-monitor-service
spec:
  selector:
    app: cloud-monitor
  ports:
    - port: 80
      targetPort: 8000
  type: LoadBalancer
